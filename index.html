<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Control de Registros</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: rgb(30, 91, 79); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px 0; }
        .tarjeta { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); text-align: center; width: 95%; max-width: 900px; margin-bottom: 20px; }
        .logo-app { width: 50%; height: auto; margin-bottom: 20px; }
        #login-section { display: block; max-width: 400px; margin: 0 auto; }
        #app-section { display: none; }
        .sub-panel { display: none; border-top: 2px solid #eee; margin-top: 20px; padding-top: 20px; text-align: left; }
        .controles-busqueda, .form-edicion, .form-admin { display: flex; flex-direction: row; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; }
        .form-edicion { flex-direction: column; max-width: 600px; margin: 15px auto 0 auto; }
        input, select, button, textarea { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        textarea { resize: vertical; font-family: inherit; }
        button { background-color: rgb(156, 35, 72); color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: rgb(120, 25, 55); }
        .btn-add { background-color: #2e7d32; }
        .btn-send-block { background-color: #0288d1; width: 100%; font-size: 18px; margin-top: 15px; }
        .btn-logout { background-color: #555; width: 100%; margin-top: 30px;}
        .panel-bloqueo { background-color: #f4f4f4; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .contenedor-tabla { overflow-x: auto; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: rgb(30, 91, 79); color: white; padding: 12px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; white-space: nowrap; color: #333;}
        tr:hover { background-color: #f1f8e9; }
        .btn-del { background: #c62828; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

    <!-- CONTROL DE ACCESO -->
    <div id="login-section" class="tarjeta">
        <img src="Imagen11.png" alt="Logo" class="logo-app">
        <h2>Acceso al Sistema</h2>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="iniciarSesion()">Entrar</button>
        </div>
        <div id="login-mensaje" style="color: red; font-weight: bold; margin-top: 10px;"></div>
    </div>

    <!-- CUERPO CENTRAL -->
    <div id="app-section" class="tarjeta">
        <h2 id="saludo-usuario">Panel del Sistema</h2>
        
        <div id="panel-busqueda">
            <h3>Módulo de Consulta</h3>
            <div class="controles-busqueda">
                <input type="text" id="valorBusqueda" placeholder="Valor a buscar...">
                <select id="columnaBusqueda">
                    <option value="Nombre">Nombre</option>
                    <option value="CURP">CURP</option>
                    <option value="Folio">Folio</option>
                </select>
                <button onclick="ejecutarBusqueda()">Buscar</button>
            </div>
            <div id="contenedor-resultados"></div>
        </div>

        <div id="panel-edicion" class="sub-panel">
            <h3>Módulo de Edición</h3>
            <div class="form-edicion">
                <select id="actividadRealizar" onchange="cambiarOpcionesEstatus()">
                    <option value="">-- Selecciona actividad --</option>
                    <option value="SOBRANTES">REGISTRO DE SOBRANTES</option>
                    <option value="ENTREGADAS">REGISTRO DE ENTREGADAS</option>
                </select>
                <div id="campos-edicion" style="display: none; flex-direction: column; gap: 10px;">
                    <input type="text" id="editFolio" placeholder="Escribe Folio">
                    <select id="editEstatus"></select>
                    <textarea id="editObservaciones" placeholder="Obs."></textarea>
                    <button class="btn-add" onclick="agregarAlBloqueLocal()">+ Agregar</button>
                </div>
                <div id="area-lote-temporal" style="display:none; margin-top:20px;">
                    <h4>Lista de espera (<span id="contador-lote">0</span>):</h4>
                    <table class="tabla-lote">
                        <thead><tr><th>Folio</th><th>Estatus</th><th>Acción</th></tr></thead>
                        <tbody id="lote-body"></tbody>
                    </table>
                    <button class="btn-send-block" id="btnEnviarBloque" onclick="enviarLoteAlServidor()">🚀 Enviar Bloque</button>
                </div>
            </div>
        </div>

        <div id="panel-admin" class="sub-panel">
            <div class="panel-bloqueo">
                <h3>Administración</h3>
                <p><b>Crear / Editar Usuario:</b></p>
                <div class="form-admin">
                    <input type="text" id="adminUser" placeholder="Usuario">
                    <input type="password" id="adminPass" placeholder="Contraseña">
                    <select id="adminRol">
                        <option value="USER">Usuario</option>
                        <option value="ATENCION">Atención</option>
                        <option value="ADMIN">Administrador</option>
                    </select>
                    <button class="btn-add" onclick="guardarUsuarioAdmin()">Guardar</button>
                </div>
                <p style="margin-top:20px;"><b>Bloquear Usuario:</b></p>
                <div class="form-admin">
                    <select id="listaUsuariosAdmin"><option>Cargando...</option></select>
                    <button style="background-color: #d32f2f;" onclick="ejecutarBloqueo()">Bloquear</button>
                </div>
                <button style="margin-top:20px; width:100%; background: #555;" onclick="cargarBitacora()">Ver Bitácora</button>
                <div id="contenedor-bitacora" style="display:none; margin-top:10px; max-height:200px; overflow-y:auto; background:white; padding:5px;">
                    <table id="tabla-bitacora" style="font-size:11px;"></table>
                </div>
            </div>
        </div>

        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz1aiUFmrB9mo3tLU98orSSN_qJts3WvyFYJCoy3UufumYkZxBl__QObYwQXXie9f786A/exec';
        let usuarioActual = "", rolActual = "", loteTemporal = [];
        let datosDispositivo = { ip: "...", ubicacion: "..." };

        async function enviarPeticion(datos) {
            datos.usuario = usuarioActual;
            datos.ip = datosDispositivo.ip;
            datos.ubicacion = datosDispositivo.ubicacion;
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(datos) });
            return await res.json();
        }

        async function iniciarSesion() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const res = await enviarPeticion({ action: "login", password: pass, usuario: user });
            if(res.exito) {
                usuarioActual = user; rolActual = res.rol;
                configurarVistasPorRol(rolActual);
            } else { alert(res.error); }
        }

        function configurarVistasPorRol(rol) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            if(rol === "ATENCION" || rol === "ADMIN") document.getElementById('panel-edicion').style.display = 'block';
            if(rol === "ADMIN") { document.getElementById('panel-admin').style.display = 'block'; cargarUsuariosParaAdmin(); }
        }

        async function cargarUsuariosParaAdmin() {
            const select = document.getElementById('listaUsuariosAdmin');
            const users = await enviarPeticion({ action: "obtener_usuarios" });
            select.innerHTML = '';
            users.forEach(u => select.innerHTML += `<option value="${u.usuario}">${u.usuario} [${u.estado}]</option>`);
        }

        async function guardarUsuarioAdmin() {
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            const rol = document.getElementById('adminRol').value;
            const res = await enviarPeticion({ action: "guardar_usuario", usuarioAEditar: user, nuevoPassword: pass, nuevoRol: rol, nuevoEstado: "Activo" });
            alert(res.mensaje);
            cargarUsuariosParaAdmin();
        }

        async function cargarBitacora() {
            const cont = document.getElementById('contenedor-bitacora');
            const tabla = document.getElementById('tabla-bitacora');
            if(cont.style.display === 'block') { cont.style.display = 'none'; return; }
            cont.style.display = 'block';
            const logs = await enviarPeticion({ action: "obtener_bitacora" });
            tabla.innerHTML = "<tr><th>Fecha</th><th>Usuario</th><th>Acción</th></tr>";
            logs.reverse().forEach(f => {
                tabla.innerHTML += `<tr><td>${f[0].substring(0,16)}</td><td>${f[1]}</td><td>${f[2]}</td></tr>`;
            });
        }

        async function ejecutarBloqueo() {
            const user = document.getElementById('listaUsuariosAdmin').value;
            const res = await enviarPeticion({ action: "bloquear_usuario", usuarioAQuitar: user });
            alert(res.exito ? "Bloqueado" : "Error");
            cargarUsuariosParaAdmin();
        }

        function agregarAlBloqueLocal() {
            loteTemporal.push({ folio: document.getElementById('editFolio').value, estatus: document.getElementById('editEstatus').value, observaciones: document.getElementById('editObservaciones').value });
            actualizarTablaInterfazLote();
        }

        async function enviarLoteAlServidor() {
            const res = await enviarPeticion({ action: "actualizar_lote", lote: loteTemporal });
            alert(res.mensaje);
            loteTemporal = [];
            actualizarTablaInterfazLote();
        }

        function actualizarTablaInterfazLote() {
            const tbody = document.getElementById('lote-body');
            tbody.innerHTML = "";
            loteTemporal.forEach((item, i) => {
                tbody.innerHTML += `<tr><td>${item.folio}</td><td>${item.estatus}</td><td><button onclick="loteTemporal.splice(${i},1); actualizarTablaInterfazLote()">X</button></td></tr>`;
            });
            document.getElementById('contador-lote').innerText = loteTemporal.length;
        }

        function cambiarOpcionesEstatus() {
            const act = document.getElementById('actividadRealizar').value;
            const sel = document.getElementById('editEstatus');
            sel.innerHTML = act === "SOBRANTES" ? '<option>SOBRANTE</option>' : '<option>ENTREGADA</option>';
            document.getElementById('campos-edicion').style.display = 'flex';
        }

        async function ejecutarBusqueda() {
            const res = await enviarPeticion({ action: "buscar", columna: document.getElementById('columnaBusqueda').value, valor: document.getElementById('valorBusqueda').value });
            const contenedor = document.getElementById('contenedor-resultados');
            contenedor.innerHTML = JSON.stringify(res);
        }

        function cerrarSesion() { location.reload(); }
    </script>
</body>
</html>
