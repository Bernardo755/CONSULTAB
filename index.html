<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Control de Registros</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: rgb(30, 91, 79); 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 0;
        }
        .tarjeta {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            text-align: center;
            width: 95%;
            max-width: 900px;
            margin-bottom: 20px;
        }
        .logo-app { width: 40%; height: auto; margin-bottom: 20px; }
        #login-section { display: block; max-width: 400px; margin: 0 auto; }
        #app-section { display: none; }
        
        /* Subsecciones de Roles */
        .sub-panel { display: none; border-top: 2px solid #eee; margin-top: 20px; padding-top: 20px; text-align: left; }
        
        .controles-busqueda, .form-edicion, .form-admin {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .form-edicion { flex-direction: column; max-width: 500px; margin: 15px auto 0 auto; }
        
        input, select, button, textarea { padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 6px; }
        textarea { resize: vertical; font-family: inherit; }
        
        button { background-color: rgb(156, 35, 72); color: white; border: none; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background-color: rgb(120, 25, 55); }
        .btn-logout { background-color: #555; width: 100%; margin-top: 20px;}
        .btn-logout:hover { background-color: #333; }
        
        .panel-bloqueo { background-color: #ffebee; border: 1px solid #ffcdd2; padding: 15px; border-radius: 8px; }

        .contenedor-tabla { overflow-x: auto; margin-top: 20px; border: 1px solid #ddd; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: rgb(30, 91, 79); color: white; padding: 12px; text-transform: uppercase; }
        td { padding: 10px; border-bottom: 1px solid #eee; white-space: nowrap; color: #333;}
        tr:hover { background-color: #f1f8e9; }
    </style>
</head>
<body>

    <!-- SECCIÓN DE LOGIN -->
    <div id="login-section" class="tarjeta">
        <img src="LOG12.png" alt="Logo" class="logo-app">
        <h2>Acceso al Sistema</h2>
        <div style="display: flex; flex-direction: column; gap: 15px;">
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button onclick="iniciarSesion()">Entrar</button>
        </div>
        <div id="login-mensaje" style="color: red; font-weight: bold; margin-top: 10px;"></div>
    </div>

    <!-- SECCIÓN PRINCIPAL DE LA APP -->
    <div id="app-section" class="tarjeta">
        <img src="LOG12.png" alt="Logo" class="logo-app">
        <h2 id="saludo-usuario">Buscador de Registros</h2>
        
        <!-- 1. PANEL DE BÚSQUEDA (Visible para todos: USER, ATENCION, ADMIN) -->
        <div id="panel-busqueda">
            <h3>Módulo de Consulta</h3>
            <div class="controles-busqueda">
                <input type="text" id="valorBusqueda" placeholder="Valor a buscar...">
                <select id="columnaBusqueda">
                    <option value="Nombre">Nombre</option>
                    <option value="CURP">CURP</option>
                    <option value="Folio">Folio</option>
                </select>
                <button onclick="ejecutarBusqueda()">Buscar</button>
            </div>
            <div id="contenedor-resultados"></div>
        </div>

        <!-- 2. PANEL DE EDICIÓN (Visible para: ATENCION, ADMIN) -->
        <div id="panel-edicion" class="sub-panel">
            <h3>Módulo de Edición</h3>
            <div class="form-edicion">
                <label style="font-weight: bold;">Actividad a realizar</label>
                <select id="actividadRealizar" onchange="cambiarOpcionesEstatus()">
                    <option value="">-- Selecciona una actividad --</option>
                    <option value="SOBRANTES">REGISTRO DE SOBRANTES</option>
                    <option value="ENTREGADAS">REGISTRO DE ENTREGADAS</option>
                </select>

                <div id="campos-edicion" style="display: none; flex-direction: column; gap: 15px; margin-top: 15px;">
                    <input type="text" id="editFolio" placeholder="Ingresa el Folio (Columna A)">
                    <select id="editEstatus"></select>
                    <textarea id="editObservaciones" placeholder="Observaciones (Opcional)" rows="3"></textarea>
                    <button onclick="ejecutarActualizacion()">Actualizar</button>
                </div>
            </div>
        </div>

        <!-- 3. PANEL DE ADMINISTRACIÓN (Visible solo para: ADMIN) -->
        <div id="panel-admin" class="sub-panel">
            <div class="panel-bloqueo">
                <h3>Control de Seguridad (Solo Administradores)</h3>
                <p>Selecciona un usuario del sistema para revocar sus accesos de forma permanente:</p>
                <div class="form-admin">
                    <select id="listaUsuariosAdmin"><option>Cargando usuarios...</option></select>
                    <button style="background-color: #d32f2f;" onclick="ejecutarBloqueo()">Bloquear Acceso</button>
                </div>
            </div>
        </div>

        <button class="btn-logout" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbz4OhUmUuXBij3ORHtd1iY-W2AHY7RsaTaRo-RngRMRChj9S6Qf3rnUcSSJb3eT7-cjHQ/exec';
        
        let usuarioActual = ""; 
        let rolActual = "";
        let datosDispositivo = { ip: "Obteniendo...", ubicacion: "Obteniendo..." };

        // Listeners Tecla Enter
        document.getElementById('pass').addEventListener('keypress', e => { if (e.key === 'Enter') iniciarSesion(); });
        document.getElementById('valorBusqueda').addEventListener('keypress', e => { if (e.key === 'Enter') ejecutarBusqueda(); });

        window.onload = async function() {
            // Cargar sesión si existe
            if(sessionStorage.getItem("usuarioActual")) {
                usuarioActual = sessionStorage.getItem("usuarioActual");
                rolActual = sessionStorage.getItem("rolActual");
                configurarVistasPorRol(rolActual);
            }
            // Obtener IP
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                datosDispositivo.ip = data.ip || "No disponible";
                datosDispositivo.ubicacion = data.city ? `${data.city}, ${data.region}, ${data.country_name}` : "No disponible";
            } catch (error) {
                datosDispositivo.ip = "No disponible"; datosDispositivo.ubicacion = "No disponible";
            }
        };

        async function enviarPeticion(datos) {
            datos.usuario = usuarioActual;
            datos.ip = datosDispositivo.ip;
            datos.ubicacion = datosDispositivo.ubicacion;
            const respuesta = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(datos),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            });
            return await respuesta.json();
        }

        function configurarVistasPorRol(rol) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('saludo-usuario').innerText = `Panel del Sistema [Rol: ${rol}]`;

            // Resetear vistas
            document.getElementById('panel-edicion').style.display = 'none';
            document.getElementById('panel-admin').style.display = 'none';

            if (rol === "ATENCION" || rol === "ADMIN") {
                document.getElementById('panel-edicion').style.display = 'block';
            }
            if (rol === "ADMIN") {
                document.getElementById('panel-admin').style.display = 'block';
                cargarUsuariosParaAdmin();
            }
        }

        async function iniciarSesion() {
            const user = document.getElementById('user').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const msj = document.getElementById('login-mensaje');
            if (!user || !pass) return msj.innerText = "Por favor, llena ambos campos.";
            msj.innerText = "Validando...";

            try {
                // Mandamos el usuario temporal para la validación inicial
                usuarioActual = user;
                const res = await enviarPeticion({ action: "login", password: pass });
                if (res.exito) {
                    rolActual = res.rol;
                    sessionStorage.setItem("usuarioActual", user);
                    sessionStorage.setItem("rolActual", rolActual);
                    msj.innerText = "";
                    configurarVistasPorRol(rolActual);
                } else {
                    msj.innerText = res.error;
                    usuarioActual = "";
                }
            } catch (e) { msj.innerText = "Error en conexión con el servidor."; }
        }

        // CONTROL DESPLEGABLES DINÁMICOS EDICIÓN
        function cambiarOpcionesEstatus() {
            const actividad = document.getElementById('actividadRealizar').value;
            const contenedorCampos = document.getElementById('campos-edicion');
            const selectorEstatus = document.getElementById('editEstatus');
            
            if(!actividad) { contenedorCampos.style.display = 'none'; return; }
            
            contenedorCampos.style.display = 'flex';
            selectorEstatus.innerHTML = '';

            let opciones = [];
            if(actividad === "SOBRANTES") {
                opciones = ["SOBRANTE", "SOBRANTE CON OBSERVACIONES"];
            } else if(actividad === "ENTREGADAS") {
                opciones = ["ENTREGADA", "ENVIADA A OTRO ESTADO", "ENVIADA A OTRA SARE"];
            }

            opciones.forEach(opt => {
                let el = document.createElement('option');
                el.value = opt; el.innerText = opt;
                selectorEstatus.appendChild(el);
            });
        }

        async function ejecutarActualizacion() {
            const folio = document.getElementById('editFolio').value.trim();
            const estatus = document.getElementById('editEstatus').value;
            const obs = document.getElementById('editObservaciones').value.trim();

            if(!folio) return alert("Debes capturar un Folio.");
            
            if(!confirm(`¿Estás seguro de actualizar el Folio ${folio} al estatus "${estatus}"?`)) return;

            try {
                const res = await enviarPeticion({
                    action: "actualizar_registro",
                    folio: folio,
                    estatus: estatus,
                    observaciones: obs
                });

                if(res.exito) {
                    alert(res.mensaje); // "Concluyó con las actualizaciones"
                    document.getElementById('editFolio').value = '';
                    document.getElementById('editObservaciones').value = '';
                } else {
                    alert("Error: " + res.error);
                }
            } catch(e) { alert("Error al procesar actualización."); }
        }

        async function cargarUsuariosParaAdmin() {
            const select = document.getElementById('listaUsuariosAdmin');
            try {
                const usuarios = await enviarPeticion({ action: "obtener_usuarios" });
                select.innerHTML = '';
                usuarios.forEach(u => {
                    if(u.usuario !== usuarioActual) { // No auto-bloquearse
                        let opt = document.createElement('option');
                        opt.value = u.usuario;
                        opt.innerText = `${u.usuario} (${u.estado})`;
                        select.appendChild(opt);
                    }
                });
            } catch(e) { select.innerHTML = '<option>Error al cargar lista</option>'; }
        }

        async function ejecutarBloqueo() {
            const userParaBloquear = document.getElementById('listaUsuariosAdmin').value;
            if(!userParaBloquear) return alert("Selecciona un usuario válido.");

            if(!confirm(`¿DURANTE ESTA ACCIÓN EL USUARIO "${userParaBloquear}" PERDERÁ TODO ACCESO. ¿Proceder?`)) return;

            try {
                const res = await enviarPeticion({ action: "bloquear_usuario", usuarioAQuitar: userParaBloquear });
                if(res.exito) {
                    alert(`El usuario ${userParaBloquear} ha sido marcado como BLOQUEADO exitosamente.`);
                    cargarUsuariosParaAdmin();
                } else { alert("Error: " + res.error); }
            } catch(e) { alert("Error de comunicación."); }
        }

        // BÚSQUEDA (Mismo motor optimizado anterior con sanitización de texto)
        function escaparHTML(t) { return t ? String(t).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : ""; }

        async function ejecutarBusqueda() {
            const valor = document.getElementById('valorBusqueda').value.trim();
            const columna = document.getElementById('columnaBusqueda').value;
            const contenedor = document.getElementById('contenedor-resultados');

            if (!valor) return alert("Por favor ingresa un valor.");
            contenedor.innerHTML = '<p style="font-weight:bold; color: #555;">Consultando servidor de alto volumen...</p>';

            try {
                const resultados = await enviarPeticion({ action: "buscar", columna: columna, valor: valor });

                if (resultados.length > 0 && resultados[0].error) {
                    contenedor.innerHTML = `<p style="color:red; font-weight:bold;">${resultados[0].error}</p>`;
                    return;
                }
                let html = `<div class="contenedor-tabla"><table><thead><tr>
                    <th>NOMBRE</th><th>ESTATUS</th><th>SARE</th><th>MUNICIPIO</th><th>CCT</th><th>ESCUELA</th><th>NIVEL</th><th>CURP</th><th>MES_REMESA</th>
                    </tr></thead><tbody id="tabla-body"></tbody></table></div>`;
                contenedor.innerHTML = html;

                const tbody = document.getElementById('tabla-body');
                resultados.forEach(f => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${escaparHTML(f.NOMBRE)}</td><td>${escaparHTML(f.ESTATUS)}</td>
                        <td>${escaparHTML(f.SARE)}</td><td>${escaparHTML(f.MUNICIPIO)}</td>
                        <td>${escaparHTML(f.CCT)}</td><td>${escaparHTML(f.ESCUELA)}</td>
                        <td>${escaparHTML(f.NIVEL)}</td><td>${escaparHTML(f.CURP)}</td>
                        <td>${escaparHTML(f.MES_REMESA)}</td>`;
                    tbody.appendChild(tr);
                });
            } catch (error) { contenedor.innerHTML = '<p style="color:red;">Error de lectura.</p>'; }
        }

        async function cerrarSesion() {
            if(usuarioActual) { await enviarPeticion({ action: "logout" }); }
            sessionStorage.clear();
            usuarioActual = ""; rolActual = "";
            document.getElementById('contenedor-resultados').innerHTML = '';
            document.getElementById('valorBusqueda').value = '';
            document.getElementById('app-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }
    </script>
</body>
</html>
